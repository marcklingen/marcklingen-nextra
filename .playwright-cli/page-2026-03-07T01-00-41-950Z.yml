          - /url: /docs/integrations/sdk/typescript
        - text: to directly capture feedback from users as a quality signal
    - paragraph [ref=e75]:
      - emphasis [ref=e76]: Langfuse can be self-hosted or used with a generous free tier in our managed cloud version.
    - heading "🚧 Debugging UIPermalink for this section" [level=2] [ref=e77]:
