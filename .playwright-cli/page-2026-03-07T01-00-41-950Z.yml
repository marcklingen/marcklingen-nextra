    - heading "Langfuse - Open source observability and analytics for LLM Apps" [level=1] [ref=e10]
    - generic [ref=e11]:
      - generic [ref=e13]:
        - text: Clemens, Max and Marc,
        - time [ref=e14]: 7/19/2023
        - generic [ref=e15]: •
        - link "Langfuse" [ref=e16] [cursor=pointer]:
          - /url: /tags/Langfuse
      - button "Back" [ref=e17] [cursor=pointer]
    - paragraph [ref=e18]:
      - emphasis [ref=e19]:
        - strong [ref=e20]: "TLDR:"
        - text: Langfuse is building open source product analytics (think ‘Mixpanel’) for LLM apps. We help companies to track and analyze quality, cost and latency across product releases and use cases.
    - paragraph [ref=e21]:
      - img "Langfuse" [ref=e24]
    - paragraph [ref=e25]: Hi everyone,
    - paragraph [ref=e26]: we’re Max, Marc and Clemens. We were part of the Winter 23 batch and work on Langfuse, where we help teams make sense of how their LLM applications perform.
    - heading "🤯 ProblemPermalink for this section" [level=2] [ref=e27]:
      - text: 🤯 Problem
      - link "Permalink for this section" [ref=e28] [cursor=pointer]:
        - /url: "#-problem"
        - text: "#"
    - paragraph [ref=e29]:
      - text: LLMs represent a new paradigm in software. Single LLM calls are probabilistic and add substantial latency and cost. Applications use LLMs in new ways via advanced prompting, embedding-based retrieval, chains, and agents with tools. Teams building production-grade LLM applications have new
      - strong [ref=e30]: product analytics
      - text: and
      - strong [ref=e31]: monitoring
      - text: "needs:"
    - list [ref=e32]:
      - listitem [ref=e33]:
        - strong [ref=e34]: Quality of outputs
        - text: is difficult to measure. Outputs can e.g. be inaccurate, unhelpful, poorly formatted, hallucinated or error.
      - listitem [ref=e35]:
        - strong [ref=e36]: Cost of compute
        - text: is a priority again given high inference costs.
      - listitem [ref=e37]:
        - strong [ref=e38]: Latency of responses
        - text: matters for synchronous use cases.
      - listitem [ref=e39]:
        - strong [ref=e40]: Debugging is challenging
        - text: due to increasingly complex LLM applications (chains, agents, tool usage).
      - listitem [ref=e41]:
        - strong [ref=e42]: Understanding user behavior
        - text: is difficult given open-ended user prompts and conversational interactions.
    - heading "🧠 SolutionPermalink for this section" [level=2] [ref=e43]:
      - text: 🧠 Solution
      - link "Permalink for this section" [ref=e44] [cursor=pointer]:
        - /url: "#-solution"
        - text: "#"
    - paragraph [ref=e45]:
      - img "Metrics" [ref=e48]
    - paragraph [ref=e49]:
      - text: "Langfuse derives actionable insights from production data. Our customers use Langfuse to answer questions such as:"
      - emphasis [ref=e50]: “How helpful are my LLM app’s outputs? What is my LLM API spend by customer? What do latencies look like across geographies and steps of LLM chains? Did the quality of the application improve in newer versions? What was the impact of switching from zero-shotting GPT4 to using few-shotted Llama calls?”
    - heading "MetricsPermalink for this section" [level=4] [ref=e51]:
      - text: Metrics
      - link "Permalink for this section" [ref=e52] [cursor=pointer]:
        - /url: "#metrics"
        - text: "#"
    - list [ref=e53]:
      - listitem [ref=e54]:
        - strong [ref=e55]: Quality
        - text: is measured through user feedback, model-based scoring and human-in-the-loop scored samples. Quality is assessed over time as well as across prompt versions, LLMs and users.
      - listitem [ref=e56]:
        - strong [ref=e57]: Cost and Latency
        - text: are accurately measured and broken down by user, session, geography, feature, model and prompt version.
    - heading "InsightsPermalink for this section" [level=4] [ref=e58]:
      - text: Insights
      - link "Permalink for this section" [ref=e59] [cursor=pointer]:
        - /url: "#insights"
        - text: "#"
    - list [ref=e60]:
      - listitem [ref=e61]:
        - text: Monitor quality/cost/latency
        - strong [ref=e62]: tradeoffs
        - text: by release to facilitate product and engineering decisions.
      - listitem [ref=e63]:
        - strong [ref=e64]: Cluster use cases
        - text: by employing a classifier to understand what users are doing.
      - listitem [ref=e65]:
        - text: Break down
        - strong [ref=e66]: LLM usage by customer
        - text: for usage-based billing and profitability analysis.
    - heading "IntegrationsPermalink for this section" [level=4] [ref=e67]:
      - text: Integrations
      - link "Permalink for this section" [ref=e68] [cursor=pointer]:
        - /url: "#integrations"
        - text: "#"
    - list [ref=e69]:
