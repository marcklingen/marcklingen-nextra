        - link "Python" [ref=e71] [cursor=pointer]:
          - /url: /docs/integrations/sdk/python
        - text: and
        - link "Typescript" [ref=e72] [cursor=pointer]:
          - /url: /docs/integrations/sdk/typescript
        - text: SDKs to easily monitor complex LLM apps
      - listitem [ref=e73]:
