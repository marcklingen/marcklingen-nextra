    - paragraph [ref=e28]: I’m interested in economics, technology, and the intersection of both. Since high school, I enjoyed tinkering with computers and building things. After an undergrad in business where I found all data-problems to be extremely exciting, I did my masters in Computer Science and Innovation at the Technical University of Munich and CDTM. During that time, I got the chance to live in China, the US, Ireland and Mexico. In my short time in research, I dived deep on the economics of open source software and solutions to the oracle problem in blockchain technology. Before starting Langfuse, I worked at Google, DHL, Cherry Ventures, and startups in roles ranging from software engineering to product management and sales.
